<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WIFI AZILAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #FFD400; --dark: #1a1a1a; --success: #2ecc71; --danger: #e74c3c; --gray: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #eff3f6; color: #2d3436; }
        
        header { background: var(--dark); color: var(--primary); padding: 30px; text-align: center; border-bottom: 5px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .container { max-width: 1100px; margin: auto; padding: 20px; }

        /* واجهة الزبون */
        .search-card { background: white; padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-top: 20px; }
        .search-input { width: 80%; max-width: 400px; padding: 15px; border: 2px solid #dfe6e9; border-radius: 50px; font-size: 1.1rem; text-align: center; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(255,212,0,0.2); }
        
        .status-box { margin-top: 25px; padding: 20px; border-radius: 15px; display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* لوحة التحكم الجمالية */
        #admin-panel { display: none; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .member-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); display: grid; grid-template-columns: 1fr 2fr 0.5fr; gap: 20px; align-items: center; border-right: 6px solid var(--primary); }
        
        .months-wrapper { display: flex; flex-wrap: wrap; gap: 6px; }
        .month-chip { padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; background: var(--gray); cursor: pointer; border: 1px solid #ddd; transition: 0.2s; }
        .month-chip.paid { background: var(--success); color: white; border-color: var(--success); box-shadow: 0 2px 5px rgba(46,204,113,0.3); }

        .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: var(--dark); color: var(--primary); }
        .btn-delete { background: none; color: var(--danger); font-size: 1.2rem; }
        .btn-admin-link { background: none; color: #b2bec3; text-decoration: underline; margin-top: 40px; }

        input[type="number"], input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <h1>SMART WIFI AZILAL 🚀</h1>
</header>

<div class="container">
    <!-- واجهة الزبون -->
    <div id="client-view" class="search-card">
        <h2 style="margin-bottom: 10px;">🔍 تتبع حالة الاشتراك</h2>
        <p style="color: #636e72; margin-bottom: 25px;">أدخل اسمك الكريم للتأكد من وضعية الحساب</p>
        <input type="text" id="c-search" class="search-input" placeholder="اكتب اسمك هنا..." oninput="smartSearch()">
        <div id="status-display" class="status-box"></div>
        <button class="btn-admin-link" onclick="toAdmin()">دخول الإدارة 🔐</button>
    </div>

    <!-- واجهة الإدارة -->
    <div id="admin-panel">
        <div class="admin-header">
            <h2>📊 لوحة التحكم في الاشتراكات</h2>
            <button class="btn" style="background:#dfe6e9;" onclick="toClient()">خروج</button>
        </div>

        <div class="search-card" style="margin-bottom: 30px; padding: 20px;">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="new-name" placeholder="اسم المشترك الجديد" style="flex: 2;">
                <input type="number" id="new-price" placeholder="الثمن (DH)" style="flex: 1;">
                <button class="btn btn-add" onclick="saveNew()">إضافة +</button>
            </div>
        </div>

        <div id="members-list"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW4JPshbopwnkCzeCViZIwbGNC0cY4o68",
        databaseURL: "https://smazilal-79a8a-default-rtdb.firebaseio.com",
        projectId: "smazilal-79a8a",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let dataCache = {};
    const months = ["يناير", "فبراير", "مارس", "أبريل", "ماي", "يونيو", "يوليوز", "غشت", "شتنبر", "أكتوبر", "نونبر", "دجنبر"];

    function toAdmin() { if(prompt("كلمة السر:") === "1234") { document.getElementById('admin-panel').style.display='block'; document.getElementById('client-view').style.display='none'; } }
    function toClient() { document.getElementById('admin-panel').style.display='none'; document.getElementById('client-view').style.display='block'; }

    function saveNew() {
        const n = document.getElementById('new-name').value;
        const p = document.getElementById('new-price').value;
        if(n && p) { db.ref('members/' + Date.now()).set({ name: n, price: p, payments: {} }); document.getElementById('new-name').value=''; }
    }

    db.ref('members/').on('value', (s) => {
        dataCache = s.val() || {};
        const list = document.getElementById('members-list');
        list.innerHTML = "";
        for(let id in dataCache) {
            let mBtns = "";
            months.forEach((m, i) => {
                const paid = dataCache[id].payments && dataCache[id].payments['m'+(i+1)];
                mBtns += `<span class="month-chip ${paid?'paid':''}" onclick="toggleP('${id}','m${i+1}')">${m}</span>`;
            });
            list.innerHTML += `<div class="member-card">
                <div><strong>${dataCache[id].name}</strong><br><small>${dataCache[id].price} DH</small></div>
                <div class="months-wrapper">${mBtns}</div>
                <button class="btn-delete" onclick="del('${id}')">🗑️</button>
            </div>`;
        }
    });

    function toggleP(id, m) { const curr = (dataCache[id].payments && dataCache[id].payments[m]) || false; db.ref('members/'+id+'/payments/'+m).set(!curr); }
    function del(id) { if(confirm("حذف؟")) db.ref('members/'+id).remove(); }

    function smartSearch() {
        const val = document.getElementById('c-search').value.trim().toLowerCase();
        const display = document.getElementById('status-display');
        
        if(val.length < 3) { display.style.display = 'none'; return; }

        let found = null;
        for(let id in dataCache) { if(dataCache[id].name.toLowerCase().includes(val)) { found = dataCache[id]; break; } }

        if(found) {
            display.style.display = 'block';
            const curM = new Date().getMonth() + 1;
            const isPaid = found.payments && found.payments['m'+curM];
            
            // حساب المتأخرات
            let unpaid = [];
            for(let i=1; i<curM; i++) { if(!found.payments || !found.payments['m'+i]) unpaid.push(months[i-1]); }

            display.style.background = isPaid ? '#e8f5e9' : '#ffebee';
            display.style.color = isPaid ? '#2ecc71' : '#e74c3c';
            display.innerHTML = `<h3>${isPaid ? '✅ اشتراكك مفعل' : '❌ يرجى تسوية الوضعية'}</h3>
                                 <p style="margin-top:10px">شهر ${months[curM-1]}: ${isPaid?'مؤدى':'غير مؤدى'}</p>
                                 ${unpaid.length > 0 ? `<p style="font-size:0.8rem; color:#636e72; margin-top:10px">تنبيه: لديك شهور سابقة غير مؤداة (${unpaid.join(', ')})</p>` : ''}`;
        } else {
            display.style.display = 'block';
            display.style.background = '#f1f2f6';
            display.style.color = '#747d8c';
            display.innerHTML = "🔍 لم يتم العثور على اسم مطابق";
        }
    }
</script>
</body>
</html>
