<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WIFI AZILAL</title>
    <!-- مكتبات Firebase الأساسية -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #FFD400; --dark: #111; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: #333; padding-bottom: 50px; }
        header { background: var(--dark); color: var(--primary); text-align: center; padding: 20px; border-bottom: 4px solid var(--primary); }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #eee; border-radius: 8px; }
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; padding: 12px; transition: 0.3s; width: 100%; }
        .btn-admin { background: var(--dark); color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        .stat-card { text-align: center; padding: 15px; background: #fff; border-radius: 10px; flex: 1; }
    </style>
</head>
<body>

<header>
    <h1>SMART WIFI AZILAL</h1>
</header>

<div class="container">
    <!-- إحصائيات -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <div class="stat-card"><h3>المشتركين</h3><p id="count">0</p></div>
        <div class="stat-card"><h3>المداخيل</h3><p id="income">0 DH</p></div>
    </div>

    <!-- إضافة مشترك -->
    <div class="box">
        <h2>👤 إضافة مشترك جديد</h2>
        <input type="text" id="m-name" placeholder="الاسم الكامل">
        <input type="number" id="m-price" placeholder="المبلغ">
        <input type="month" id="m-date" value="2026-05">
        <button class="btn-admin" onclick="addMember()">حفظ في السحابة ✅</button>
    </div>

    <!-- لائحة المشتركين -->
    <div class="box">
        <h2>📋 لائحة الإدارة</h2>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>الاسم</th><th>المبلغ</th><th>التاريخ</th><th>إجراء</th></tr>
                </thead>
                <tbody id="m-table"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyCW4JPshbopwnkCzeCViZIwbGNC0cY4o68",
        databaseURL: "https://smazilal-79a8a-default-rtdb.firebaseio.com",
        authDomain: "smazilal-79a8a.firebaseapp.com",
        projectId: "smazilal-79a8a",
        storageBucket: "smazilal-79a8a.appspot.com",
        messagingSenderId: "791971660492",
        appId: "1:791971660492:web:7edf10b35580469c643869"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // إضافة مشترك
    function addMember() {
        const name = document.getElementById('m-name').value;
        const price = document.getElementById('m-price').value;
        const date = document.getElementById('m-date').value;

        if (!name || !price) return alert("المرجو ملء البيانات");

        const id = Date.now();
        db.ref('members/' + id).set({
            name: name,
            price: price,
            date: date
        }).then(() => {
            document.getElementById('m-name').value = "";
            document.getElementById('m-price').value = "";
        });
    }

    // عرض البيانات وتحديث الإحصائيات
    db.ref('members/').on('value', (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('m-table');
        tbody.innerHTML = "";
        let total = 0, count = 0;

        for (let id in data) {
            count++;
            total += parseInt(data[id].price || 0);
            tbody.innerHTML += `<tr>
                <td>${data[id].name}</td>
                <td>${data[id].price} DH</td>
                <td>${data[id].date || '---'}</td>
                <td><button onclick="deleteMember('${id}')" style="color:red; background:none; width:auto;">حذف</button></td>
            </tr>`;
        }
        document.getElementById('count').innerText = count;
        document.getElementById('income').innerText = total + " DH";
    });

    function deleteMember(id) {
        if (confirm("هل تريد الحذف؟")) db.ref('members/' + id).remove();
    }
</script>
</body>
</html>
