<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WIFI AZILAL - CLOUD READY</title>
    
    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #FFD400; --dark: #111; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: #333; padding-bottom: 50px; }
        header { background: var(--dark); color: var(--primary); text-align: center; padding: 25px; border-bottom: 5px solid var(--primary); }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #eee; border-radius: 10px; outline: none; }
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; padding: 12px; transition: 0.3s; }
        .btn-admin { background: var(--dark); color: var(--primary); width: 100%; }
        #admin-panel { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        .debt-tag { color: var(--danger); font-weight: bold; }
        .paid-badge { background: #e8f8f0; color: var(--success); padding: 2px 5px; border-radius: 4px; font-size: 0.7rem; margin: 2px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <h1>SMART WIFI AZILAL</h1>
    <p>نظام إدارة الاشتراكات الذكي</p>
</header>

<div class="container">
    <div class="box">
        <h2>🔍 فحص الاشتراك</h2>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="user-search" placeholder="أدخل اسمك الكامل...">
            <button onclick="checkStatus()" style="background: var(--dark); color: white;">بحث</button>
        </div>
        <div id="search-result"></div>
    </div>

    <center><button onclick="unlockAdmin()" style="background:none; color:#888; font-size:0.7rem; margin:10px;">⚙️ الإدارة</button></center>

    <div id="admin-panel">
        <div class="box">
            <h2>👤 إضافة مشترك</h2>
            <input type="text" id="m-name" placeholder="الاسم الكامل">
            <input type="number" id="m-price" placeholder="المبلغ الشهري (DH)">
            <input type="month" id="m-start-date">
            <button class="btn-admin" onclick="addMember()">حفظ المشترك</button>
        </div>

        <div class="box">
            <h2>💰 تسجيل استخلاص</h2>
            <select id="p-member"></select>
            <div style="display: flex; gap: 5px;">
                <select id="p-month">
                    <option value="1">يناير</option><option value="2">فبراير</option><option value="3">مارس</option>
                    <option value="4">أبريل</option><option value="5">ماي</option><option value="6">يونيو</option>
                    <option value="7">يوليوز</option><option value="8">غشت</option><option value="9">شتنبر</option>
                    <option value="10">أكتوبر</option><option value="11">نونبر</option><option value="12">دجنبر</option>
                </select>
                <input type="number" id="p-year" value="2026">
            </div>
            <button onclick="recordPayment()" style="background: var(--success); color: white; width: 100%;">تأكيد الأداء</button>
        </div>

        <div class="box" style="overflow-x: auto;">
            <h2>📊 الرقابة العامة</h2>
            <table id="admin-table">
                <thead><tr><th>المشترك</th><th>الشهور المؤداة</th><th>الديون</th><th>حذف</th></tr></thead>
                <tbody id="admin-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- إعدادات Firebase (اتركها فارغة حتى تملأها لاحقاً) ---
    const firebaseConfig = { apiKey: "", databaseURL: "" }; 

    let useFirebase = false;
    if (firebaseConfig.apiKey !== "") {
        firebase.initializeApp(firebaseConfig);
        useFirebase = true;
    }

    // الذاكرة الاحتياطية (لتعمل محلياً في حال غياب Firebase)
    let localDB = JSON.parse(localStorage.getItem('azilal_wifi_cloud')) || { members: {}, payments: {} };

    function syncData(data) {
        if (data) {
            localDB = data;
            localStorage.setItem('azilal_wifi_cloud', JSON.stringify(localDB));
        }
        renderAll();
    }

    if (useFirebase) {
        firebase.database().ref('wifi').on('value', (snap) => syncData(snap.val()));
    } else {
        syncData();
    }

    function unlockAdmin() {
        if(prompt("كلمة السر:") === "1234") document.getElementById('admin-panel').style.display = "block";
    }

    function addMember() {
        const name = document.getElementById('m-name').value.trim();
        const price = document.getElementById('m-price').value;
        const start = document.getElementById('m-start-date').value;
        
        if(!name || !price || !start) return alert("أكمل البيانات");

        const newId = "m_" + Date.now();
        const memberData = { name, price: Number(price), startDate: start };

        if (useFirebase) {
            firebase.database().ref('wifi/members/' + newId).set(memberData);
        } else {
            localDB.members[newId] = memberData;
            syncData();
        }
        alert("تم الحفظ بنجاح");
    }

    function recordPayment() {
        const mId = document.getElementById('p-member').value;
        const month = document.getElementById('p-month').value;
        const year = document.getElementById('p-year').value;
        if(!mId) return;

        const payId = "p_" + Date.now();
        const payData = { mId, month: Number(month), year: Number(year), at: new Date().toLocaleString() };

        if (useFirebase) {
            firebase.database().ref('wifi/payments/' + payId).set(payData);
        } else {
            if (!localDB.payments) localDB.payments = {};
            localDB.payments[payId] = payData;
            syncData();
        }
    }

    function calculateDebt(id, member, allPayments) {
        const start = new Date(member.startDate + "-01");
        const now = new Date();
        let months = [];
        let temp = new Date(start);
        while (temp <= now) {
            months.push({ m: temp.getMonth() + 1, y: temp.getFullYear() });
            temp.setMonth(temp.getMonth() + 1);
        }
        const paid = Object.values(allPayments || {}).filter(p => p.mId === id);
        const unpaid = months.filter(m => !paid.find(p => p.month === m.m && p.year === m.y));
        return { unpaid, paid, totalDebt: unpaid.length * member.price };
    }

    function renderAll() {
        const adminBody = document.getElementById('admin-body');
        const select = document.getElementById('p-member');
        adminBody.innerHTML = ''; 
        select.innerHTML = '<option value="">-- اختر مشتركاً --</option>';

        const members = localDB.members || {};
        const payments = localDB.payments || {};

        for(let id in members) {
            const m = members[id];
            const debt = calculateDebt(id, m, payments);
            adminBody.innerHTML += `<tr>
                <td><b>${m.name}</b></td>
                <td>${debt.paid.map(p => `<span class="paid-badge">${p.month}/${p.year}</span>`).join('')}</td>
                <td class="debt-tag">${debt.totalDebt} DH</td>
                <td><button onclick="deleteMember('${id}')">🗑️</button></td>
            </tr>`;
            select.innerHTML += `<option value="${id}">${m.name}</option>`;
        }
    }

    function checkStatus() {
        const search = document.getElementById('user-search').value.toLowerCase().trim();
        const members = localDB.members || {};
        const mId = Object.keys(members).find(id => members[id].name.toLowerCase().includes(search));
        
        if(!mId) return alert("الاسم غير مسجل");
        
        const m = members[mId];
        const debt = calculateDebt(mId, m, localDB.payments);
        document.getElementById('search-result').innerHTML = `
            <div style="background:#fffdf2; padding:15px; border-radius:10px; margin-top:10px; border:2px solid #FFD400">
                <h3>مرحباً ${m.name}</h3>
                <h2 style="color:red">الواجب أداؤه: ${debt.totalDebt} DH</h2>
                <p style="font-size:0.8rem">الأشهر غير المؤداة: ${debt.unpaid.map(d => d.m+'/'+d.y).join(' | ')}</p>
            </div>`;
    }

    function deleteMember(id) {
        if(confirm("حذف؟")) {
            if (useFirebase) {
                firebase.database().ref('wifi/members/' + id).remove();
            } else {
                delete localDB.members[id];
                syncData();
            }
        }
    }
</script>
</body>
</html>
