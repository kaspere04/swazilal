<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart WiFi Azilal - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-gold: #ffcc00;
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
            --success-green: #2ecc71;
            --danger-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
        }

        /* الهيدر */
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent-gold);
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--accent-gold);
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
        }

        /* شبكة الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        .stat-card h3 {
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
            color: var(--accent-gold);
        }

        /* قسم الإدارة */
        .admin-section {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-add {
            background: var(--accent-gold);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* جدول المشتركين */
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            text-align: right;
            color: var(--text-gray);
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #222;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 35px;
            height: 35px;
            background: var(--accent-gold);
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
        }

        .badge-paid { background: rgba(46, 204, 113, 0.2); color: var(--success-green); }
        .badge-debt { background: rgba(231, 76, 60, 0.2); color: var(--danger-red); }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-edit { background: #333; color: white; }
        .btn-months { background: var(--accent-gold); color: black; }

        /* نافذة منبثقة (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .month-btn {
            padding: 10px;
            border: 1px solid #444;
            background: #222;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .month-btn.active { background: var(--success-green); border-color: var(--success-green); }
    </style>
</head>
<body>

    <header>
        <h1>SMART WIFI AZILAL</h1>
        <p style="font-size: 12px; color: var(--text-gray);">نظام التحكم الكامل في الدفعات</p>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>المشتركين</h3>
            <p id="stat-count">5</p>
        </div>
        <div class="stat-card">
            <h3>إيرادات شهرية</h3>
            <p id="stat-income">850 د.م</p>
        </div>
        <div class="stat-card">
            <h3>ديون عالقة</h3>
            <p id="stat-debts" style="color: var(--danger-red);">1750 د.م</p>
        </div>
    </div>

    <div class="admin-section">
        <div class="section-header">
            <h2>قائمة المشتركين</h2>
            <button class="btn-add" onclick="toggleModal('addModal')">+ مشترك جديد</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>المشترك</th>
                    <th>الأشهر</th>
                    <th>الدين</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="users-list">
                <tr>
                    <td>
                        <div class="user-info">
                            <div class="avatar">أ</div>
                            <div>
                                <div>أحمد بنعلي</div>
                                <div style="font-size: 11px; color: var(--text-gray);">0602359188</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge badge-paid">3 / 5</span></td>
                    <td><span style="color: var(--danger-red);">450 د.م</span></td>
                    <td class="actions">
                        <button class="btn-action btn-months" onclick="toggleModal('monthsModal')">الأشهر</button>
                        <button class="btn-action btn-edit">تعديل</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="monthsModal" class="modal">
        <div class="modal-content">
            <h3>اشتراكات — أحمد بنعلي</h3>
            <div class="month-grid">
                <button class="month-btn active">يناير</button>
                <button class="month-btn active">فبراير</button>
                <button class="month-btn">مارس</button>
                <button class="month-btn active">أبريل</button>
                <button class="month-btn">مايو</button>
                <button class="month-btn">يونيو</button>
            </div>
            <button class="btn-add" style="width:100%; margin-top:20px;" onclick="toggleModal('monthsModal')">حفظ التغييرات</button>
        </div>
    </div>

    <script>
        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        // إغلاق النافذة عند الضغط خارجها
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = "none";
            }
        }
    </script>
</body>
</html>
