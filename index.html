<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WIFI AZILAL - CLOUD SYSTEM</title>
    
    <!-- استدعاء مكتبات Firebase السحابية -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #FFD400; --dark: #111; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: #333; padding-bottom: 50px; }
        header { background: var(--dark); color: var(--primary); text-align: center; padding: 25px; border-bottom: 5px solid var(--primary); }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #eee; border-radius: 10px; outline: none; }
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; padding: 12px; transition: 0.3s; }
        .btn-admin { background: var(--dark); color: var(--primary); width: 100%; }
        #admin-panel { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        .debt-tag { color: var(--danger); font-weight: bold; }
        .paid-badge { background: #e8f8f0; color: var(--success); padding: 2px 5px; border-radius: 4px; font-size: 0.7rem; margin: 2px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <h1>SMART WIFI AZILAL</h1>
    <p>النظام السحابي الموحد</p>
</header>

<div class="container">
    <!-- بوابة الزبائن -->
    <div class="box" style="border: 2px solid var(--primary);">
        <h2>🔍 بوابة الزبائن</h2>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="user-search" placeholder="اسمك الكامل...">
            <button onclick="checkStatus()" style="background: var(--dark); color: white;">بحث</button>
        </div>
        <div id="search-result"></div>
    </div>

    <center><button onclick="unlockAdmin()" style="background:none; color:#888; font-size:0.7rem;">⚙️ دخول الإدارة</button></center>

    <!-- لوحة المدير -->
    <div id="admin-panel">
        <div class="box">
            <h2>👤 إضافة/تعديل</h2>
            <input type="text" id="m-name" placeholder="الاسم الكامل">
            <input type="number" id="m-price" placeholder="المبلغ">
            <input type="month" id="m-start-date">
            <button class="btn-admin" onclick="addMember()">حفظ في السحابة</button>
        </div>

        <div class="box">
            <h2>💰 تسجيل أداء شهر</h2>
            <select id="p-member"></select>
            <div style="display: flex; gap: 5px;">
                <select id="p-month">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                </select>
                <input type="number" id="p-year" value="2026">
            </div>
            <button onclick="recordPayment()" style="background: var(--success); color: white; width: 100%;">تأكيد الدفع</button>
        </div>

        <div class="box" style="overflow-x: auto;">
            <h2>📊 الرقابة</h2>
            <table id="admin-table">
                <thead><tr><th>المشترك</th><th>المدفوع</th><th>الدين</th><th>حذف</th></tr></thead>
                <tbody id="admin-body"></tbody>
            </table>
        </div>

        <div class="box" style="overflow-x: auto;">
            <h2>🧾 سجل العمليات</h2>
            <table id="history-table">
                <thead><tr><th>المشترك</th><th>الشهر</th><th>إجراء</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. إعدادات FIREBASE (يجب استبدالها بمعلومات مشروعك)
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "your-project.firebaseapp.com",
        databaseURL: "https://your-project-default-rtdb.firebaseio.com",
        projectId: "your-project",
        storageBucket: "your-project.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    // تهيئة Firebase
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // فتح الإدارة
    function unlockAdmin() {
        if(prompt("كلمة السر:") === "1234") document.getElementById('admin-panel').style.display = "block";
    }

    // إضافة مشترك للسحابة
    function addMember() {
        const name = document.getElementById('m-name').value;
        const price = document.getElementById('m-price').value;
        const start = document.getElementById('m-start-date').value;
        if(!name || !price || !start) return alert("أكمل الخانات");
        
        db.ref('wifi/members').push({ name, price: Number(price), startDate: start });
        alert("تم الحفظ سحابياً");
    }

    // تسجيل دفعة للسحابة
    function recordPayment() {
        const mId = document.getElementById('p-member').value;
        const month = document.getElementById('p-month').value;
        const year = document.getElementById('p-year').value;
        if(!mId) return;

        db.ref('wifi/payments').push({ mId, month: Number(month), year: Number(year), at: new Date().toLocaleString() });
    }

    // الاستماع المباشر للتغييرات (Realtime Sync)
    db.ref('wifi').on('value', (snap) => {
        const data = snap.val() || { members: {}, payments: {} };
        renderAll(data);
    });

    function calculateDebt(id, member, allPayments) {
        const start = new Date(member.startDate + "-01");
        const now = new Date();
        let months = [];
        let temp = new Date(start);
        while (temp <= now) {
            months.push({ m: temp.getMonth() + 1, y: temp.getFullYear() });
            temp.setMonth(temp.getMonth() + 1);
        }
        const paid = Object.values(allPayments || {}).filter(p => p.mId === id);
        const unpaid = months.filter(m => !paid.find(p => p.month === m.m && p.year === m.y));
        return { unpaid, paid, totalDebt: unpaid.length * member.price };
    }

    function renderAll(data) {
        const adminBody = document.getElementById('admin-body');
        const historyBody = document.getElementById('history-body');
        const select = document.getElementById('p-member');
        
        adminBody.innerHTML = ''; historyBody.innerHTML = '';
        select.innerHTML = '<option value="">-- اختر --</option>';

        for(let id in data.members) {
            const m = data.members[id];
            const debt = calculateDebt(id, m, data.payments);
            adminBody.innerHTML += `<tr>
                <td><b>${m.name}</b></td>
                <td>${debt.paid.map(p => `<span class="paid-badge">${p.month}/${p.year}</span>`).join('')}</td>
                <td class="debt-tag">${debt.totalDebt} DH</td>
                <td><button onclick="deleteMember('${id}')">🗑️</button></td>
            </tr>`;
            select.innerHTML += `<option value="${id}">${m.name}</option>`;
        }

        const pays = data.payments || {};
        Object.keys(pays).reverse().forEach(pId => {
            const p = pays[pId];
            const m = data.members[p.mId];
            if(m) historyBody.innerHTML += `<tr>
                <td>${m.name}</td><td>${p.month}/${p.year}</td>
                <td><button onclick="cancelPay('${pId}')" style="background:red; color:white; padding:2px 5px;">إلغاء</button></td>
            </tr>`;
        });
    }

    function checkStatus() {
        const search = document.getElementById('user-search').value.toLowerCase();
        db.ref('wifi').once('value', (snap) => {
            const data = snap.val();
            const mId = Object.keys(data.members).find(id => data.members[id].name.toLowerCase().includes(search));
            if(!mId) return alert("الاسم غير موجود");
            const m = data.members[mId];
            const debt = calculateDebt(mId, m, data.payments);
            document.getElementById('search-result').innerHTML = `
                <div style="background:#fffdf2; padding:15px; border-radius:10px; margin-top:10px; border:1px solid #FFD400">
                    <h3>مرحباً ${m.name}</h3>
                    <h2 style="color:red">الواجب أداؤه: ${debt.totalDebt} DH</h2>
                    <p>الشهور المطلوبة: ${debt.unpaid.map(d => d.m+'/'+d.y).join(' | ')}</p>
                </div>`;
        });
    }

    function deleteMember(id) { if(confirm("حذف المشترك؟")) db.ref('wifi/members/'+id).remove(); }
    function cancelPay(id) { if(confirm("إلغاء الدفعة؟")) db.ref('wifi/payments/'+id).remove(); }
</script>
</body>
</html>
