<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart WiFi Azilal - Pro Admin</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    :root {
        --g: #F5C518; --bg: #0d0d0d; --s1: #141414; --s2: #1c1c1c;
        --tx: #f0f0f0; --gr: #22c55e; --rd: #ef4444;
    }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--tx); margin: 0; padding: 15px; }
    
    /* Header */
    header { background: var(--s1); padding: 15px; border-radius: 12px; border: 1px solid #222; text-align: center; margin-bottom: 20px; }
    .logo-text { color: var(--g); font-weight: 900; font-size: 20px; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--s2); padding: 20px; border-radius: 14px; border: 1px solid #252525; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 900; color: var(--g); display: block; }
    .stat-label { font-size: 11px; color: #999; }

    /* Main Section */
    .admin-card { background: var(--s2); border-radius: 15px; padding: 15px; border: 1px solid #252525; }
    .flex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    
    /* Subscriber Cards */
    .sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
    .sub-card { background: var(--s1); border: 1px solid #252525; border-radius: 14px; padding: 15px; }
    .avatar { width: 40px; height: 40px; background: var(--g); color: #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
    
    /* Buttons */
    .btn { border: none; border-radius: 8px; padding: 8px 15px; font-family: inherit; font-weight: 700; cursor: pointer; font-size: 13px; }
    .btn-gold { background: var(--g); color: #111; }
    .btn-red { background: #ef444418; color: var(--rd); border: 1px solid #ef444433; }
    .btn-dark { background: #333; color: white; }

    /* Modals */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
    .modal { background: var(--s2); border-radius: 15px; width: 100%; max-width: 400px; padding: 20px; border: 1px solid #333; }
    .inp { background: #252525; border: 1px solid #333; padding: 12px; border-radius: 9px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }

    /* Month Grid */
    .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
    .month-btn { padding: 10px 5px; border-radius: 8px; font-size: 11px; border: 1px solid #333; background: #222; color: #555; cursor: pointer; }
    .month-btn.paid { background: #22c55e18; border-color: #22c55e44; color: var(--gr); }
</style>
</head>
<body>

<header>
    <div class="logo-text">SMART WIFI AZILAL</div>
    <div style="font-size: 11px; color: #666; margin-top: 5px;">لوحة الإدارة السحابية 📡</div>
</header>

<div class="stats-grid">
    <div class="stat-card">
        <span class="stat-val" id="count-ui">0</span>
        <span class="stat-label">المشتركين</span>
    </div>
    <div class="stat-card">
        <span class="stat-val" style="color: var(--gr)" id="income-ui">0 د.م</span>
        <span class="stat-label">إيرادات محققة</span>
    </div>
    <div class="stat-card">
        <span class="stat-val" style="color: var(--rd)" id="debt-ui">0 د.م</span>
        <span class="stat-label">ديون عالقة</span>
    </div>
</div>

<div class="admin-card">
    <div class="flex-header">
        <h3 style="font-size: 15px;">👤 المشتركون</h3>
        <button class="btn btn-gold" onclick="showM('modal-add')">➕ جديد</button>
    </div>
    <input type="text" class="inp" id="search" placeholder="🔍 بحث سريع..." oninput="draw()">
    <div class="sub-grid" id="list"></div>
</div>

<div class="overlay" id="modal-add">
    <div class="modal">
        <h3>➕ مشترك جديد</h3>
        <input class="inp" id="n-name" placeholder="الاسم الكامل">
        <input class="inp" id="n-phone" placeholder="رقم الهاتف">
        <input class="inp" id="n-fee" placeholder="الثمن (درهم)" type="number">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-gold" style="flex:1" onclick="addNew()">إضافة</button>
            <button class="btn btn-dark" style="flex:1" onclick="hideM('modal-add')">إلغاء</button>
        </div>
    </div>
</div>

<div class="overlay" id="modal-pay">
    <div class="modal">
        <h3 id="pay-name">📅 سجل الدفع</h3>
        <div class="month-grid" id="m-grid"></div>
        <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="hideM('modal-pay')">إغلاق</button>
    </div>
</div>

<script>
// 1. CONFIG
const config = {
    apiKey: "AIzaSyCW4JPshbopwnkCzeCViZIwbGNC0cY4o68",
    databaseURL: "https://smazilal-79a8a-default-rtdb.firebaseio.com",
    projectId: "smazilal-79a8a",
};
firebase.initializeApp(config);
const db = firebase.database();

let subs = [];
const MONTHS = ["يناير","فبراير","مارس","أبريل","ماي","يونيو","يوليو","أغسطس","شتنبر","أكتوبر","نونبر","دجنبر"];
const CUR_M = new Date().getMonth();
const CUR_Y = new Date().getFullYear();

// 2. DATA
db.ref('subscribers').on('value', (snap) => {
    const val = snap.val();
    subs = val ? Object.keys(val).map(k => ({id:k, ...val[k]})) : [];
    calcStats();
    draw();
});

function calcStats() {
    let income = 0, debt = 0;
    subs.forEach(s => {
        const pay = (s.payments && s.payments[CUR_Y]) ? s.payments[CUR_Y] : Array(12).fill(0);
        let unpaidCount = 0;
        for(let i=0; i<=CUR_M; i++) {
            if(pay[i]) income += parseInt(s.fee);
            else unpaidCount++;
        }
        debt += unpaidCount * parseInt(s.fee);
    });
    document.getElementById('count-ui').innerText = subs.length;
    document.getElementById('income-ui').innerText = income + " د.م";
    document.getElementById('debt-ui').innerText = debt + " د.م";
}

// 3. UI
function draw() {
    const q = document.getElementById('search').value.toLowerCase();
    const list = document.getElementById('list');
    list.innerHTML = subs.filter(s => s.name.toLowerCase().includes(q)).map(s => {
        const pay = (s.payments && s.payments[CUR_Y]) ? s.payments[CUR_Y] : Array(12).fill(0);
        const isPaid = pay[CUR_M] === 1;
        return `
        <div class="sub-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="avatar">${s.name[0]}</div>
                    <div><div style="font-weight:700">${s.name}</div><small style="color:#666">${s.phone}</small></div>
                </div>
                <span style="color:${isPaid? 'var(--gr)':'var(--rd)'}; font-size:12px; font-weight:bold">${isPaid? '✓ خالص':'✗ متأخر'}</span>
            </div>
            <div style="display:flex; gap:5px;">
                <button class="btn btn-gold" style="flex:1" onclick="openPay('${s.id}')">📅 الأشهر</button>
                <button class="btn btn-red" onclick="delSub('${s.id}')">🗑</button>
                <a href="https://wa.me/212${s.phone.substring(1)}" target="_blank" class="btn btn-dark">💬</a>
            </div>
        </div>`;
    }).join('');
}

// 4. ACTIONS
function addNew() {
    const name = document.getElementById('n-name').value;
    const phone = document.getElementById('n-phone').value;
    const fee = document.getElementById('n-fee').value;
    if(name && phone && fee) {
        db.ref('subscribers').push({ name, phone, fee, payments: {[CUR_Y]: Array(12).fill(0)} });
        hideM('modal-add');
    }
}

function openPay(id) {
    const s = subs.find(x => x.id === id);
    document.getElementById('pay-name').innerText = "سجل: " + s.name;
    const pay = (s.payments && s.payments[CUR_Y]) ? s.payments[CUR_Y] : Array(12).fill(0);
    document.getElementById('m-grid').innerHTML = MONTHS.map((m, i) => `
        <button class="month-btn ${pay[i]?'paid':''}" onclick="togglePay('${id}', ${i})">${m}<br>${pay[i]?'✓':'✗'}</button>
    `).join('');
    showM('modal-pay');
}

function togglePay(id, mIdx) {
    const s = subs.find(x => x.id === id);
    if(!s.payments) s.payments = {};
    if(!s.payments[CUR_Y]) s.payments[CUR_Y] = Array(12).fill(0);
    s.payments[CUR_Y][mIdx] = s.payments[CUR_Y][mIdx] === 1 ? 0 : 1;
    db.ref('subscribers/' + id).update({ payments: s.payments }).then(() => openPay(id));
}

function delSub(id) { if(confirm("حذف المشترك نهائياً؟")) db.ref('subscribers/' + id).remove(); }
function showM(id) { document.getElementById(id).style.display = 'flex'; }
function hideM(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
