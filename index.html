<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WIFI AZILAL - CLOUD</title>
    <!-- استدعاء مكتبة Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { --primary: #FFD400; --dark: #111; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: #333; padding-bottom: 50px; }
        header { background: var(--dark); color: var(--primary); text-align: center; padding: 30px; border-bottom: 5px solid var(--primary); }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h2 { font-size: 1.3rem; margin-bottom: 20px; border-right: 5px solid var(--primary); padding-right: 15px; }

        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1.5px solid #eee; border-radius: 10px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; transition: 0.3s; padding: 12px 25px; }
        .btn-primary { background: var(--dark); color: var(--primary); width: 100%; }
        .btn-unlock { background: var(--primary); color: var(--dark); margin-bottom: 20px; }

        /* إخفاء لوحة المدير افتراضياً */
        #admin-panel { display: none; border: 2px solid var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .debt-tag { color: var(--danger); font-weight: bold; }
        
        .client-section { background: linear-gradient(145deg, #ffffff, #f0f0f0); border: 2px solid #ddd; }
        #search-result { margin-top: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1>SMART WIFI AZILAL</h1>
    <p>النظام السحابي لإدارة الاشتراكات</p>
</header>

<div class="container">

    <!-- قسم المشترك: يظهر للجميع -->
    <div class="box client-section">
        <h2>🔍 بوابة الاستعلام للعملاء</h2>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="user-search" placeholder="أدخل اسمك الكامل هنا...">
            <button onclick="checkStatus()" style="background: var(--dark); color: white;">بحث</button>
        </div>
        <div id="search-result"></div>
    </div>

    <!-- زر الدخول للمدير -->
    <center>
        <button class="btn-unlock" id="lock-btn" onclick="unlockAdmin()">🔓 دخول الإدارة (خاص بالمدير)</button>
    </center>

    <!-- لوحة المدير: مخفية بكلمة سر -->
    <div id="admin-panel">
        <div class="box">
            <h2>👤 تسجيل مشترك جديد</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="m-name" placeholder="الاسم الكامل">
                <input type="number" id="m-price" placeholder="المبلغ الشهري">
            </div>
            <label>تاريخ البداية:</label>
            <input type="month" id="m-start-date">
            <button class="btn-primary" onclick="addMember()">+ حفظ في السحابة</button>
        </div>

        <div class="box">
            <h2>💰 تسجيل دفعة شهرية</h2>
            <select id="p-member"></select>
            <div style="display: flex; gap: 10px;">
                <select id="p-month">
                    <option value="1">يناير</option><option value="2">فبراير</option><option value="3">مارس</option>
                    <option value="4">أبريل</option><option value="5">ماي</option><option value="6">يونيو</option>
                    <option value="7">يوليوز</option><option value="8">غشت</option><option value="9">شتنبر</option>
                    <option value="10">أكتوبر</option><option value="11">نونبر</option><option value="12">دجنبر</option>
                </select>
                <input type="number" id="p-year" value="2026">
            </div>
            <button onclick="recordPayment()" style="background: var(--success); color: white; width: 100%;">تأكيد العملية</button>
        </div>

        <div class="box" style="overflow-x: auto;">
            <h2>📊 الرقابة العامة</h2>
            <table id="admin-table">
                <thead>
                    <tr>
                        <th>المشترك</th>
                        <th>المتأخرات</th>
                        <th>المبلغ</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="admin-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- إعدادات FIREBASE (ضع معلوماتك هنا) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };
    
    // تأكد من تهيئة Firebase فقط إذا لم يتم تهيئته مسبقاً
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // دالة فتح الإدارة بكلمة سر
    function unlockAdmin() {
        const pass = prompt("أدخل كلمة المرور الخاصة بالمدير:");
        if(pass === "1234") { // يمكنك تغيير كلمة السر هنا
            document.getElementById('admin-panel').style.display = "block";
            document.getElementById('lock-btn').style.display = "none";
            refreshData();
        } else {
            alert("خطأ! لا تملك صلاحية الدخول.");
        }
    }

    // إضافة مشترك للسحابة
    function addMember() {
        const name = document.getElementById('m-name').value;
        const price = document.getElementById('m-price').value;
        const start = document.getElementById('m-start-date').value;

        if(!name || !price || !start) return alert("أكمل البيانات");

        db.ref('members/').push({
            name, price: Number(price), startDate: start
        });
        alert("تم الحفظ بنجاح!");
    }

    // تسجيل دفعة في السحابة
    function recordPayment() {
        const id = document.getElementById('p-member').value;
        const month = document.getElementById('p-month').value;
        const year = document.getElementById('p-year').value;

        db.ref('payments/').push({
            memberId: id, month: Number(month), year: Number(year)
        });
        alert("تم تسجيل الدفع");
    }

    // جلب البيانات ومزامنتها تلقائياً
    function refreshData() {
        db.ref().on('value', (snapshot) => {
            const val = snapshot.val() || { members: {}, payments: {} };
            renderAdminTable(val);
            updateMemberSelect(val.members);
        });
    }

    function renderAdminTable(data) {
        const tbody = document.getElementById('admin-body');
        tbody.innerHTML = '';
        
        for(let id in data.members) {
            const m = data.members[id];
            const debt = calculateDebt(id, m, data.payments);
            tbody.innerHTML += `
                <tr>
                    <td><b>${m.name}</b></td>
                    <td><span class="debt-tag">${debt.unpaidCount} أشهر</span></td>
                    <td style="background:#fff0f0"><b>${debt.totalDebt} DH</b></td>
                    <td><button onclick="deleteMember('${id}')" style="color:red">×</button></td>
                </tr>
            `;
        }
    }

    function calculateDebt(mId, member, allPayments) {
        const start = new Date(member.startDate + "-01");
        const now = new Date(); 
        let months = [];
        let temp = new Date(start);

        while (temp <= now) {
            months.push({ month: temp.getMonth()+1, year: temp.getFullYear() });
            temp.setMonth(temp.getMonth()+1);
        }

        const paid = Object.values(allPayments || {}).filter(p => p.memberId === mId);
        const unpaid = months.filter(m => !paid.find(p => p.month === m.month && p.year === m.year));

        return {
            unpaidCount: unpaid.length,
            totalDebt: unpaid.length * member.price,
            unpaidDetails: unpaid,
            paidCount: paid.length
        };
    }

    function checkStatus() {
        const search = document.getElementById('user-search').value.toLowerCase();
        db.ref().once('value', (snap) => {
            const data = snap.val();
            const mId = Object.keys(data.members).find(id => data.members[id].name.toLowerCase().includes(search));
            const resDiv = document.getElementById('search-result');
            
            if(!mId) {
                resDiv.innerHTML = "<p style='color:red'>الاسم غير موجود!</p>";
                return;
            }

            const m = data.members[mId];
            const debt = calculateDebt(mId, m, data.payments);
            resDiv.innerHTML = `
                <div style="padding:15px; border:2px solid var(--primary); border-radius:10px">
                    <h3>مرحباً ${m.name}</h3>
                    <p>✅ تم أداء: ${debt.paidCount} أشهر</p>
                    <p class="debt-tag">⚠️ الباقي: ${debt.unpaidCount} أشهر</p>
                    <hr>
                    <h2 style="color:var(--danger)">المبلغ الواجب أداؤه: ${debt.totalDebt} DH</h2>
                    <small>الأشهر العالقة: ${debt.unpaidDetails.map(d => d.month+'/'+d.year).join(' - ')}</small>
                </div>
            `;
        });
    }

    function updateMemberSelect(members) {
        const select = document.getElementById('p-member');
        select.innerHTML = '';
        for(let id in members) {
            select.innerHTML += `<option value="${id}">${members[id].name}</option>`;
        }
    }

    function deleteMember(id) {
        if(confirm("حذف المشترك نهائياً؟")) db.ref('members/'+id).remove();
    }

    // بدء المراقبة
    refreshData();
</script>

</body>
</html>
