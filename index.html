<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WIFI AZILAL - FULL CONTROL</title>

    <!-- استدعاء مكتبات Firebase اللازمة للتشغيل -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #FFD400; --dark: #111; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: #333; padding-bottom: 50px; }
        header { background: var(--dark); color: var(--primary); text-align: center; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #eee; border-radius: 8px; }
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; padding: 12px; transition: 0.3s; width: 100%; }
        .btn-admin { background: var(--dark); color: var(--primary); }
        .btn-admin:hover { opacity: 0.9; transform: scale(0.98); }
    </style>
</head>
<body>

<header>
    <h1>SMART WIFI AZILAL</h1>
</header>

<div class="container">
    <!-- نموذج إضافة مشترك -->
    <div class="box" style="border-right: 5px solid var(--primary);">
        <h2>👤 إضافة مشترك جديد</h2>
        <input type="text" id="m-name" placeholder="الاسم الكامل">
        <input type="number" id="m-price" placeholder="المبلغ الشهري">
        <input type="month" id="m-start-date">
        <button class="btn-admin" onclick="addMember()">حفظ المشترك ✅</button>
    </div>

    <!-- قسم عرض البيانات -->
    <div class="box">
        <h2>📊 لائحة المشتركين</h2>
        <div id="members-list">جاري تحميل البيانات...</div>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بمشروعك SMAZILAL
    const firebaseConfig = {
        apiKey: "AIzaSyCW4JPshbopwnkCzeCViZIwbGNC0cY4o68",
        databaseURL: "https://smazilal-79a8a-default-rtdb.firebaseio.com",
        authDomain: "smazilal-79a8a.firebaseapp.com",
        projectId: "smazilal-79a8a",
        storageBucket: "smazilal-79a8a.appspot.com",
        messagingSenderId: "791971660492",
        appId: "1:791971660492:web:7edf10b35580469c643869"
    };

    // تفعيل Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة إضافة مشترك وإرسالها للسحابة فوراً
    function addMember() {
        const name = document.getElementById('m-name').value;
        const price = document.getElementById('m-price').value;
        const startDate = document.getElementById('m-start-date').value;

        if (!name || !price) {
            alert("المرجو ملء جميع الخانات!");
            return;
        }

        const memberId = Date.now(); // معرف فريد لكل مشترك
        const memberData = {
            name: name,
            price: price,
            startDate: startDate,
            status: "نشط"
        };

        // الحفظ في Firebase Realtime Database
        db.ref('members/' + memberId).set(memberData)
        .then(() => {
            alert("تم حفظ المشترك " + name + " بنجاح في السحابة!");
            document.getElementById('m-name').value = "";
            document.getElementById('m-price').value = "";
        })
        .catch((error) => {
            alert("خطأ في الحفظ: " + error.message);
        });
    }

    // عرض البيانات تلقائياً عند التغيير
    db.ref('members/').on('value', (snapshot) => {
        const data = snapshot.val();
        let html = "<ul>";
        for (let id in data) {
            html += `<li>${data[id].name} - ${data[id].price} DH</li>`;
        }
        html += "</ul>";
        document.getElementById('members-list').innerHTML = html;
    });
</script>

</body>
</html>
