<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WIFI AZILAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #FFD400; --dark: #111; --bg: #f4f7f6; --success: #27ae60; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #333; }
        header { background: var(--dark); color: var(--primary); text-align: center; padding: 25px; border-bottom: 4px solid var(--primary); }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        #admin-panel { display: none; text-align: right; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 10px; font-size: 1rem; }
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; padding: 15px; transition: 0.3s; }
        .btn-main { background: var(--dark); color: var(--primary); width: 100%; }
        .btn-admin-access { background: none; color: #999; font-size: 0.8rem; margin-top: 40px; text-decoration: underline; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<header>
    <h1>SMART WIFI AZILAL 🚀</h1>
</header>

<div class="container">
    <!-- 1. واجهة المشترك (تظهر أولاً) -->
    <div id="client-view" class="box">
        <h2>تحقق من حالة اشتراكك</h2>
        <input type="text" id="client-search" placeholder="اكتب اسمك هنا..." oninput="checkMyStatus()">
        <div id="client-result" style="margin-top: 20px; font-weight: bold; font-size: 1.2rem;"></div>
        
        <!-- زر الدخول للإدارة في الأسفل -->
        <button class="btn-admin-access" onclick="openAdmin()">دخول الإدارة 🔐</button>
    </div>

    <!-- 2. واجهة الإدارة (مخفية) -->
    <div id="admin-panel">
        <div class="box">
            <h2>➕ إضافة مشترك جديد</h2>
            <input type="text" id="m-name" placeholder="اسم المشترك">
            <input type="number" id="m-price" placeholder="المبلغ الشهري">
            <button class="btn-main" onclick="addNewMember()">حفظ المشترك في السحابة</button>
        </div>

        <div class="box">
            <h2>💰 التحكم في الشهور والاشتراكات</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>المبلغ</th>
                            <th>شهر 5 (ماي)</th>
                            <th>شهر 6 (يونيو)</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
            <button onclick="closeAdmin()" style="margin-top:20px; background:#eee;">خروج من الإدارة</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW4JPshbopwnkCzeCViZIwbGNC0cY4o68",
        databaseURL: "https://smazilal-79a8a-default-rtdb.firebaseio.com",
        authDomain: "smazilal-79a8a.firebaseapp.com",
        projectId: "smazilal-79a8a",
        storageBucket: "smazilal-79a8a.appspot.com",
        messagingSenderId: "791971660492",
        appId: "1:791971660492:web:7edf10b35580469c643869"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let membersData = {};

    // وظائف الواجهة
    function openAdmin() {
        if(prompt("كلمة السر:") === "1234") {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('client-view').style.display = 'none';
        }
    }
    function closeAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('client-view').style.display = 'block';
    }

    // إضافة مشترك
    function addNewMember() {
        const name = document.getElementById('m-name').value;
        const price = document.getElementById('m-price').value;
        if(!name || !price) return;
        const id = Date.now();
        db.ref('members/' + id).set({ name, price, m5: false, m6: false });
        document.getElementById('m-name').value = "";
    }

    // تحديث البيانات من السحابة
    db.ref('members/').on('value', (snap) => {
        membersData = snap.val() || {};
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = "";
        for(let id in membersData) {
            tbody.innerHTML += `
                <tr>
                    <td>${membersData[id].name}</td>
                    <td>${membersData[id].price} DH</td>
                    <td><input type="checkbox" ${membersData[id].m5 ? 'checked' : ''} onchange="toggleMonth('${id}', 'm5')"></td>
                    <td><input type="checkbox" ${membersData[id].m6 ? 'checked' : ''} onchange="toggleMonth('${id}', 'm6')"></td>
                    <td><button onclick="deleteM('${id}')" style="color:red;">حذف</button></td>
                </tr>`;
        }
    });

    function toggleMonth(id, month) {
        const status = membersData[id][month];
        db.ref('members/' + id + '/' + month).set(!status);
    }

    function deleteM(id) { if(confirm("حذف؟")) db.ref('members/' + id).remove(); }

    // بحث الزبون
    function checkMyStatus() {
        const q = document.getElementById('client-search').value.toLowerCase();
        const res = document.getElementById('client-result');
        if(!q) { res.innerHTML = ""; return; }
        let found = false;
        for(let id in membersData) {
            if(membersData[id].name.toLowerCase().includes(q)) {
                const s = membersData[id].m5 ? "✅ خالص (شهر 5)" : "❌ لم يؤدِ بعد (شهر 5)";
                res.innerHTML = `<span style="color:${membersData[id].m5 ? 'green' : 'red'}">${s}</span>`;
                found = true; break;
            }
        }
        if(!found) res.innerHTML = "❌ الاسم غير موجود";
    }
</script>
</body>
</html>
