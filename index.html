<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WIFI AZILAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #FFD400; --dark: #111; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #333; line-height: 1.6; }
        header { background: var(--dark); color: var(--primary); text-align: center; padding: 25px; border-bottom: 4px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        /* واجهة الإدارة */
        #admin-panel { display: none; }
        .month-grid { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .month-btn { padding: 5px 8px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; border: 1px solid #ddd; background: #f9f9f9; transition: 0.2s; }
        .paid { background: var(--success) !important; color: white; border-color: var(--success); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 10px; outline: none; }
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; padding: 15px; transition: 0.3s; }
        .btn-main { background: var(--dark); color: var(--primary); width: 100%; }
        .btn-admin-access { background: none; color: #999; font-size: 0.85rem; margin-top: 50px; text-decoration: underline; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; font-size: 0.9rem; }
        th, td { padding: 12px 8px; border: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; color: #666; }
        
        .client-search-box { text-align: center; padding: 40px 20px; }
        .status-badge { padding: 10px 20px; border-radius: 30px; display: inline-block; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>SMART WIFI AZILAL 🚀</h1>
</header>

<div class="container">
    <!-- واجهة الزبون -->
    <div id="client-view" class="box client-search-box">
        <h2>🔍 تتبع حالة الاشتراك</h2>
        <p style="color: #777; margin-bottom: 20px;">أدخل اسمك الكامل للتأكد من وضعية حسابك</p>
        <input type="text" id="client-search" placeholder="مثال: EL HASSAN..." oninput="checkStatus()">
        <div id="client-result"></div>
        <button class="btn-admin-access" onclick="enterAdmin()">لوحة التحكم (خاص بالمدير) 🔐</button>
    </div>

    <!-- واجهة الإدارة -->
    <div id="admin-panel">
        <div class="box">
            <h2 style="margin-bottom:15px;">👤 إضافة زبون جديد</h2>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
                <input type="text" id="m-name" placeholder="الاسم الكامل">
                <input type="number" id="m-price" placeholder="المبلغ">
            </div>
            <button class="btn-main" onclick="addMember()">حفظ في السحابة ✅</button>
        </div>

        <div class="box">
            <h2 style="margin-bottom:15px;">📊 إدارة تتبع الشهور (2026)</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>الزبون</th>
                            <th>المبلغ</th>
                            <th>الأشهر المؤداة (اضغط للتفعيل)</th>
                            <th>حذف</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table"></tbody>
                </table>
            </div>
            <button onclick="exitAdmin()" style="margin-top:20px; background:#eee; width:100%;">خروج</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCW4JPshbopwnkCzeCViZIwbGNC0cY4o68",
        databaseURL: "https://smazilal-79a8a-default-rtdb.firebaseio.com",
        authDomain: "smazilal-79a8a.firebaseapp.com",
        projectId: "smazilal-79a8a",
        storageBucket: "smazilal-79a8a.appspot.com",
        messagingSenderId: "791971660492",
        appId: "1:791971660492:web:7edf10b35580469c643869"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let cache = {};
    const months = ["يناير", "فبراير", "مارس", "أبريل", "ماي", "يونيو", "يوليوز", "غشت", "شتنبر", "أكتوبر", "نونبر", "دجنبر"];

    function enterAdmin() {
        if(prompt("كلمة السر:") === "1234") {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('client-view').style.display = 'none';
        }
    }
    function exitAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('client-view').style.display = 'block';
    }

    function addMember() {
        const name = document.getElementById('m-name').value;
        const price = document.getElementById('m-price').value;
        if(!name || !price) return;
        const id = Date.now();
        db.ref('members/' + id).set({ name, price, payments: {} });
        document.getElementById('m-name').value = "";
    }

    db.ref('members/').on('value', (snap) => {
        cache = snap.val() || {};
        const tbody = document.getElementById('admin-table');
        tbody.innerHTML = "";
        for(let id in cache) {
            let monthButtons = '<div class="month-grid">';
            months.forEach((m, index) => {
                const mKey = 'm' + (index + 1);
                const isPaid = cache[id].payments && cache[id].payments[mKey];
                monthButtons += `<div class="month-btn ${isPaid ? 'paid' : ''}" onclick="togglePay('${id}', '${mKey}')">${m}</div>`;
            });
            monthButtons += '</div>';

            tbody.innerHTML += `<tr>
                <td><strong>${cache[id].name}</strong></td>
                <td>${cache[id].price} DH</td>
                <td>${monthButtons}</td>
                <td><button onclick="del('${id}')" style="color:red; background:none;">حذف</button></td>
            </tr>`;
        }
    });

    function togglePay(id, mKey) {
        const currentStatus = (cache[id].payments && cache[id].payments[mKey]) || false;
        db.ref('members/' + id + '/payments/' + mKey).set(!currentStatus);
    }

    function del(id) { if(confirm("حذف المشترك نهائياً؟")) db.ref('members/' + id).remove(); }

    function checkStatus() {
        const q = document.getElementById('client-search').value.trim().toLowerCase();
        const res = document.getElementById('client-result');
        if(!q) { res.innerHTML = ""; return; }
        
        let found = false;
        const currentMonthKey = 'm' + (new Date().getMonth() + 1);

        for(let id in cache) {
            if(cache[id].name.toLowerCase().includes(q)) {
                const isPaid = cache[id].payments && cache[id].payments[currentMonthKey];
                res.innerHTML = `
                    <div class="status-badge" style="background:${isPaid ? '#e8f5e9' : '#ffebee'}; color:${isPaid ? 'green' : 'red'}; border: 2px solid ${isPaid ? 'green' : 'red'};">
                        ${isPaid ? '✅ اشتراكك مفعل لشهر ' + months[new Date().getMonth()] : '❌ يرجى تسوية وضعية شهر ' + months[new Date().getMonth()]}
                    </div>
                `;
                found = true; break;
            }
        }
        if(!found) res.innerHTML = "<p style='margin-top:15px; color:#999;'>الاسم غير مسجل في النظام</p>";
    }
</script>
</body>
</html>
