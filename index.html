<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WIFI AZILAL - FULL CONTROL</title>

    <!-- مكتبات Firebase الضرورية -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #FFD400;
            --dark: #111;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: #333; padding-bottom: 50px; }
        
        header {
            background: var(--dark);
            color: var(--primary);
            text-align: center;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .container { max-width: 1100px; margin: auto; padding: 15px; }

        .box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            border-top: 5px solid var(--primary);
        }

        h2 { margin-bottom: 20px; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }

        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            padding: 15px;
            font-size: 1rem;
            transition: 0.3s;
            width: 100%;
        }

        .btn-admin { background: var(--dark); color: var(--primary); }
        .btn-admin:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { font-size: 0.9rem; color: #777; margin-bottom: 5px; }
        .stat-card p { font-size: 1.5rem; font-weight: bold; color: var(--dark); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; color: #666; font-size: 0.9rem; }
        
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .active { background: #e8f5e9; color: var(--success); }
        .expired { background: #ffebee; color: var(--danger); }

        @media (max-width: 600px) {
            th:nth-child(3), td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>

<header>
    <h1>SMART WIFI AZILAL 🚀</h1>
    <p>نظام إدارة المشتركين الاحترافي</p>
</header>

<div class="container">
    
    <!-- إحصائيات سريعة -->
    <div class="stats-grid">
        <div class="stat-card"><h3>إجمالي المشتركين</h3><p id="stat-total">0</p></div>
        <div class="stat-card"><h3>المداخيل المتوقعة</h3><p id="stat-income">0 DH</p></div>
    </div>

    <!-- فورم الإضافة -->
    <div class="box">
        <h2>👤 إضافة مشترك جديد</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
            <input type="text" id="m-name" placeholder="الاسم الكامل للمشترك">
            <input type="number" id="m-price" placeholder="المبلغ الشهري (DH)">
            <input type="month" id="m-start-date" value="2026-05">
        </div>
        <button class="btn-admin" onclick="addMember()">حفظ وإرسال للسحابة ✅</button>
    </div>

    <!-- جدول المشتركين -->
    <div class="box">
        <h2>📋 لائحة المشتركين الحالية</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>المبلغ</th>
                        <th>تاريخ البدء</th>
                        <th>الحالة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="members-table-body">
                    <!-- البيانات تظهر هنا -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    // إعدادات Firebase الخاصة بك (مستخرجة من صورك السابقة)
    const firebaseConfig = {
        apiKey: "AIzaSyCW4JPshbopwnkCzeCViZIwbGNC0cY4o68",
        databaseURL: "https://smazilal-79a8a-default-rtdb.firebaseio.com",
        authDomain: "smazilal-79a8a.firebaseapp.com",
        projectId: "smazilal-79a8a",
        storageBucket: "smazilal-79a8a.appspot.com",
        messagingSenderId: "791971660492",
        appId: "1:791971660492:web:7edf10b35580469c643869"
    };

    // بدء الاتصال
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة إضافة المشترك
    function addMember() {
        const name = document.getElementById('m-name').value;
        const price = document.getElementById('m-price').value;
        const date = document.getElementById('m-start-date').value;

        if (!name || !price) {
            alert("أدخل البيانات كاملة أولاً!");
            return;
        }

        const id = Date.now();
        const memberData = {
            name: name,
            price: price,
            date: date,
            status: "active"
        };

        // الحفظ في Firebase
        db.ref('members/' + id).set(memberData)
        .then(() => {
            alert("تم الحفظ بنجاح!");
            document.getElementById('m-name').value = "";
            document.getElementById('m-price').value = "";
        })
        .catch(err => alert("خطأ: " + err.message));
    }

    // قراءة البيانات وتحديث الجدول تلقائياً
    db.ref('members/').on('value', (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('members-table-body');
        tbody.innerHTML = "";
        
        let totalIncome = 0;
        let count = 0;

        for (let id in data) {
            count++;
            totalIncome += parseInt(data[id].price);
            
            const row = `<tr>
                <td><strong>${data[id].name}</strong></td>
                <td>${data[id].price} DH</td>
                <td>${data[id].date}</td>
                <td><span class="status-badge active">نشط</span></td>
                <td><button onclick="deleteMember('${id}')" style="background:none; color:red; width:auto; padding:0;">حذف</button></td>
            </tr>`;
            tbody.innerHTML += row;
        }

        document.getElementById('stat-total').innerText = count;
        document.getElementById('stat-income').innerText = totalIncome + " DH";
    });

    // دالة الحذف
    function deleteMember(id) {
        if(confirm("هل أنت متأكد من حذف هذا المشترك؟")) {
            db.ref('members/' + id).remove();
        }
    }
</script>

</body>
</html>
